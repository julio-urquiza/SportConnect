<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="container">
      <div class="tailwind">
        <div id="fig-code-root" style="height: 100%">
          <div class="min-h-screen bg-background">
            <div class="min-h-screen" style="background: rgb(0, 0, 26)">
              <header
                class="sticky top-0 z-50 w-full flex items-center justify-between px-8"
                style="
                  background: rgb(0, 0, 26);
                  height: 64px;
                  border-bottom: 1px solid rgb(26, 26, 58);
                "
              >
                <button
                  style="
                    background: none;
                    border-width: medium;
                    border-style: none;
                    border-color: currentcolor;
                    border-image: none;
                    cursor: pointer;
                    padding: 0px;
                  "
                >
                  <p
                    style="
                      font-family: Jura, sans-serif;
                      font-weight: 700;
                      font-size: 28px;
                      color: rgb(255, 90, 0);
                      line-height: normal;
                    "
                  >
                    SportConnect
                  </p>
                </button>
                <div class="flex items-center gap-5">
                  <button
                    class="relative transition-opacity hover:opacity-80"
                    style="
                      background: none;
                      border-width: medium;
                      border-style: none;
                      border-color: currentcolor;
                      border-image: none;
                      cursor: pointer;
                      padding: 4px 0px;
                    "
                  >
                    <p
                      style="
                        font-family: Jura, sans-serif;
                        font-weight: 700;
                        font-size: 16px;
                        color: rgb(255, 255, 255);
                      "
                    >
                      Inicio
                    </p></button
                  ><button
                    class="relative flex items-center gap-1.5 transition-opacity hover:opacity-80"
                    style="
                      background: none;
                      border-width: medium;
                      border-style: none;
                      border-color: currentcolor;
                      border-image: none;
                      cursor: pointer;
                      padding: 4px 0px;
                    "
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-calendar-check size-4"
                      style="color: rgb(255, 90, 0)"
                    >
                      <path d="M8 2v4"></path>
                      <path d="M16 2v4"></path>
                      <rect width="18" height="18" x="3" y="4" rx="2"></rect>
                      <path d="M3 10h18"></path>
                      <path d="m9 16 2 2 4-4"></path>
                    </svg>
                    <p
                      style="
                        font-family: Jura, sans-serif;
                        font-weight: 700;
                        font-size: 16px;
                        color: rgb(255, 90, 0);
                      "
                    >
                      Mis Reservas
                    </p>
                    <div
                      class="absolute bottom-0 left-0 right-0 h-0.5 rounded-full"
                      style="background: rgb(255, 90, 0)"
                    ></div>
                  </button>
                  <div class="relative">
                    <button
                      class="h-10 px-4 rounded-[14px] flex items-center gap-2 transition-opacity hover:opacity-90"
                      style="
                        background: linear-gradient(
                          to right,
                          rgb(255, 90, 0),
                          rgba(0, 0, 26, 0.95)
                        );
                        border-width: medium;
                        border-style: none;
                        border-color: currentcolor;
                        border-image: none;
                        cursor: pointer;
                      "
                    >
                      <span
                        style="
                          font-family: Jura, sans-serif;
                          font-weight: 700;
                          font-size: 15px;
                          color: rgb(255, 255, 255);
                          white-space: nowrap;
                        "
                        >julio@gmail.com</span
                      ><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-chevron-down size-3.5"
                        style="
                          color: rgb(255, 255, 255);
                          transform: none;
                          transition: transform 0.15s;
                        "
                      >
                        <path d="m6 9 6 6 6-6"></path>
                      </svg>
                    </button>
                  </div>
                </div>
              </header>
              <main class="container mx-auto px-4 py-8">
                <div class="flex items-center gap-3 mb-8">
                  <button
                    class="flex items-center gap-2 transition-colors duration-150"
                    style="
                      background: none;
                      border-width: medium;
                      border-style: none;
                      border-color: currentcolor;
                      border-image: none;
                      cursor: pointer;
                      color: rgb(140, 140, 140);
                      font-family: Roboto, sans-serif;
                      font-size: 0.875rem;
                      padding: 0px;
                    "
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-arrow-left size-4"
                    >
                      <path d="m12 19-7-7 7-7"></path>
                      <path d="M19 12H5"></path></svg
                    >Inicio</button
                  ><span style="color: rgb(56, 56, 56)">/</span>
                  <p
                    style="
                      font-family: Roboto, sans-serif;
                      font-size: 0.875rem;
                      color: rgb(255, 255, 255);
                    "
                  >
                    Mis Reservas
                  </p>
                </div>
                <div class="flex items-center gap-3 mb-8">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-calendar-check size-7"
                    style="color: rgb(255, 90, 0)"
                  >
                    <path d="M8 2v4"></path>
                    <path d="M16 2v4"></path>
                    <rect width="18" height="18" x="3" y="4" rx="2"></rect>
                    <path d="M3 10h18"></path>
                    <path d="m9 16 2 2 4-4"></path>
                  </svg>
                  <h1
                    style="
                      font-family: Jura, sans-serif;
                      font-weight: 700;
                      font-size: 2rem;
                      color: rgb(255, 255, 255);
                    "
                  >
                    Mis Reservas
                  </h1>
                </div>
                <div
                  class="text-center py-24"
                  style="opacity: 1; transform: none"
                >
                  <div class="text-6xl mb-4">📅</div>
                  <p
                    style="
                      font-family: Jura, sans-serif;
                      font-weight: 700;
                      font-size: 1.5rem;
                      color: rgb(255, 255, 255);
                      margin-bottom: 8px;
                    "
                  >
                    No tenés reservas todavía
                  </p>
                  <p
                    style="
                      font-family: Roboto, sans-serif;
                      font-size: 1rem;
                      color: rgb(140, 140, 140);
                      margin-bottom: 24px;
                    "
                  >
                    Buscá una cancha y hacé tu primera reserva
                  </p>
                  <button
                    class="px-8 py-3 rounded-[18px] transition-opacity hover:opacity-90"
                    style="
                      background: linear-gradient(
                        to right,
                        rgba(255, 90, 0, 0.8),
                        rgba(0, 0, 26, 0.71)
                      );
                      color: rgb(255, 255, 255);
                      font-family: Jura, sans-serif;
                      font-weight: 700;
                      font-size: 1.1rem;
                      border-width: medium;
                      border-style: none;
                      border-color: currentcolor;
                      border-image: none;
                      cursor: pointer;
                    "
                  >
                    BUSCAR CANCHAS
                  </button>
                </div>
              </main>
              <footer
                style="
                  background: rgb(0, 0, 26);
                  border-top: 1px solid rgb(26, 26, 58);
                  margin-top: 64px;
                "
              >
                <div class="container mx-auto px-8 py-8">
                  <p
                    class="text-center"
                    style="
                      font-family: Roboto, sans-serif;
                      font-size: 14px;
                      color: rgb(140, 140, 140);
                    "
                  >
                    2026. SportConnect. Todos los derechos reservados.
                  </p>
                </div>
              </footer>
            </div>
          </div>
          <section
            aria-label="Notifications alt+T"
            tabindex="-1"
            aria-live="polite"
            aria-relevant="additions text"
            aria-atomic="false"
          ></section>
        </div>
      </div>
    </div>
  </body>
</html>
