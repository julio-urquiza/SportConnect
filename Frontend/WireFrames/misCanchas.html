<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <main class="container mx-auto px-4 py-8">
      <div class="mb-8" style="opacity: 1; transform: none">
        <p
          style="
            font-family: Roboto, sans-serif;
            font-size: 0.875rem;
            color: rgb(140, 140, 140);
            margin-bottom: 4px;
          "
        >
          Bienvenido, julio@gmail.com
        </p>
        <h1
          style="
            font-family: Jura, sans-serif;
            font-weight: 700;
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            color: rgb(255, 255, 255);
          "
        >
          Panel de Dueño
        </h1>
        <div class="grid grid-cols-3 gap-4 mt-6">
          <div
            class="p-4 rounded-2xl text-center"
            style="
              background: rgba(0, 0, 26, 0.6);
              border: 1px solid rgb(56, 56, 56);
            "
          >
            <p
              style="
                font-family: Jura, sans-serif;
                font-weight: 700;
                font-size: 1.8rem;
                color: rgb(255, 90, 0);
              "
            >
              1
            </p>
            <p
              style="
                font-family: Roboto, sans-serif;
                font-size: 0.8rem;
                color: rgb(140, 140, 140);
                margin-top: 2px;
              "
            >
              Canchas publicadas
            </p>
          </div>
          <div
            class="p-4 rounded-2xl text-center"
            style="
              background: rgba(0, 0, 26, 0.6);
              border: 1px solid rgb(56, 56, 56);
            "
          >
            <p
              style="
                font-family: Jura, sans-serif;
                font-weight: 700;
                font-size: 1.8rem;
                color: rgb(255, 255, 255);
              "
            >
              1
            </p>
            <p
              style="
                font-family: Roboto, sans-serif;
                font-size: 0.8rem;
                color: rgb(140, 140, 140);
                margin-top: 2px;
              "
            >
              Canchas totales
            </p>
          </div>
          <div
            class="p-4 rounded-2xl text-center"
            style="
              background: rgba(0, 0, 26, 0.6);
              border: 1px solid rgb(56, 56, 56);
            "
          >
            <p
              style="
                font-family: Jura, sans-serif;
                font-weight: 700;
                font-size: 1.8rem;
                color: rgb(74, 222, 128);
              "
            >
              3
            </p>
            <p
              style="
                font-family: Roboto, sans-serif;
                font-size: 0.8rem;
                color: rgb(140, 140, 140);
                margin-top: 2px;
              "
            >
              Reservas entrantes
            </p>
          </div>
        </div>
      </div>
      <div
        class="flex gap-1 p-1 rounded-2xl mb-6"
        style="
          background: rgba(255, 255, 255, 0.04);
          border: 1px solid rgb(56, 56, 56);
          width: fit-content;
        "
      >
        <button
          class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all duration-200"
          style="
            background: linear-gradient(
              to right,
              rgba(255, 90, 0, 0.8),
              rgba(0, 0, 26, 0.7)
            );
            color: rgb(255, 255, 255);
            font-family: Roboto, sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            border-width: medium;
            border-style: none;
            border-color: currentcolor;
            border-image: none;
            cursor: pointer;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-layout-dashboard size-4"
          >
            <rect width="7" height="9" x="3" y="3" rx="1"></rect>
            <rect width="7" height="5" x="14" y="3" rx="1"></rect>
            <rect width="7" height="9" x="14" y="12" rx="1"></rect>
            <rect width="7" height="5" x="3" y="16" rx="1"></rect></svg
          >Mis Canchas</button
        ><button
          class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all duration-200"
          style="
            background: transparent;
            color: rgb(140, 140, 140);
            font-family: Roboto, sans-serif;
            font-weight: 400;
            font-size: 0.875rem;
            border-width: medium;
            border-style: none;
            border-color: currentcolor;
            border-image: none;
            cursor: pointer;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-circle-plus size-4"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 12h8"></path>
            <path d="M12 8v8"></path></svg
          >Publicar Cancha</button
        ><button
          class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all duration-200"
          style="
            background: transparent;
            color: rgb(140, 140, 140);
            font-family: Roboto, sans-serif;
            font-weight: 400;
            font-size: 0.875rem;
            border-width: medium;
            border-style: none;
            border-color: currentcolor;
            border-image: none;
            cursor: pointer;
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-calendar-clock size-4"
          >
            <path
              d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"
            ></path>
            <path d="M16 2v4"></path>
            <path d="M8 2v4"></path>
            <path d="M3 10h5"></path>
            <path d="M17.5 17.5 16 16.3V14"></path>
            <circle cx="16" cy="16" r="6"></circle></svg
          >Reservas Entrantes
        </button>
      </div>
      <div style="opacity: 1; transform: none">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          <div
            class="rounded-2xl overflow-hidden"
            style="
              background: rgba(0, 0, 26, 0.7);
              border: 1px solid rgba(255, 90, 0, 0.4);
              opacity: 1;
              transform: none;
            "
          >
            <div class="relative h-44 overflow-hidden">
              <img
                src="https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=800&amp;q=80"
                alt="cancha de padel"
                class="w-full h-full object-cover"
              />
              <div
                class="absolute inset-0"
                style="
                  background: linear-gradient(
                    to top,
                    rgba(0, 0, 26, 0.9) 0%,
                    transparent 60%
                  );
                "
              ></div>
              <div class="absolute top-3 right-3">
                <span
                  class="px-2.5 py-1 rounded-full text-xs"
                  style="
                    background: rgba(34, 197, 94, 0.2);
                    border: 1px solid rgba(34, 197, 94, 0.4);
                    color: rgb(74, 222, 128);
                    font-family: Roboto, sans-serif;
                    font-weight: 600;
                  "
                  >Publicada</span
                >
              </div>
              <div class="absolute bottom-3 left-3">
                <p
                  style="
                    font-family: Jura, sans-serif;
                    font-weight: 700;
                    font-size: 1rem;
                    color: rgb(255, 255, 255);
                  "
                >
                  cancha de padel
                </p>
                <div class="flex items-center gap-1 mt-0.5">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-map-pin size-3"
                    style="color: rgb(140, 140, 140)"
                  >
                    <path
                      d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"
                    ></path>
                    <circle cx="12" cy="10" r="3"></circle></svg
                  ><span
                    style="
                      font-family: Roboto, sans-serif;
                      font-size: 0.75rem;
                      color: rgb(140, 140, 140);
                    "
                    >Palermo</span
                  >
                </div>
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-center justify-between mb-3">
                <span
                  style="
                    font-family: Jura, sans-serif;
                    font-size: 1.1rem;
                    font-weight: 700;
                    color: rgb(255, 90, 0);
                  "
                  >$123/hr</span
                >
                <div class="flex items-center gap-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-star size-3.5 fill-yellow-400 text-yellow-400"
                  >
                    <path
                      d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
                    ></path></svg
                  ><span
                    style="
                      font-family: Roboto, sans-serif;
                      font-size: 0.8rem;
                      color: rgb(255, 255, 255);
                    "
                    >5</span
                  >
                </div>
              </div>
              <div class="flex gap-2">
                <button
                  class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl text-sm transition-all"
                  style="
                    background: rgba(255, 255, 255, 0.05);
                    border: 1px solid rgb(56, 56, 56);
                    color: rgb(140, 140, 140);
                    font-family: Roboto, sans-serif;
                    cursor: pointer;
                  "
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-eye-off size-3.5"
                  >
                    <path
                      d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"
                    ></path>
                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"></path>
                    <path
                      d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"
                    ></path>
                    <path d="m2 2 20 20"></path></svg
                  >Ocultar</button
                ><button
                  class="py-2 px-3 rounded-xl transition-all"
                  style="
                    background: rgba(248, 81, 73, 0.08);
                    border: 1px solid rgba(248, 81, 73, 0.2);
                    color: rgb(248, 81, 73);
                    cursor: pointer;
                  "
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-trash2 lucide-trash-2 size-4"
                  >
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    <line x1="10" x2="10" y1="11" y2="17"></line>
                    <line x1="14" x2="14" y1="11" y2="17"></line>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
