<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <div
      class="relative w-full max-w-sm shrink-0"
      style="
        background: rgba(0, 0, 26, 0.7);
        border-radius: 24px;
        border: 1px solid rgb(56, 56, 56);
        padding: 28px 24px 24px;
      "
    >
      <form class="flex flex-col gap-3">
        <div class="flex items-center gap-2 mb-1">
          <button
            type="button"
            style="
              background: none;
              border-width: medium;
              border-style: none;
              border-color: currentcolor;
              border-image: none;
              cursor: pointer;
              padding: 0px;
              color: rgb(140, 140, 140);
              display: flex;
              align-items: center;
            "
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-left size-4"
            >
              <path d="m12 19-7-7 7-7"></path>
              <path d="M19 12H5"></path>
            </svg>
          </button>
          <div class="flex items-center gap-2">
            <div
              class="size-6 rounded-lg flex items-center justify-center"
              style="background: rgba(255, 90, 0, 0.15)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-users size-3.5"
                style="color: rgb(255, 90, 0)"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </div>
            <p
              style="
                font-family: Jura, sans-serif;
                font-weight: 700;
                font-size: 1.25rem;
                color: rgb(255, 255, 255);
              "
            >
              Iniciar sesión
            </p>
          </div>
        </div>
        <div
          class="flex rounded-xl p-1 mb-1"
          style="background: rgba(255, 255, 255, 0.05)"
        >
          <button
            type="button"
            class="flex-1 py-2 rounded-lg transition-all duration-200"
            style="
              font-family: Inter, sans-serif;
              font-size: 0.8rem;
              font-weight: 600;
              background: linear-gradient(
                to right,
                rgba(255, 90, 0, 0.8),
                rgba(0, 0, 26, 0.71)
              );
              color: rgb(255, 255, 255);
              border-width: medium;
              border-style: none;
              border-color: currentcolor;
              border-image: none;
              cursor: pointer;
            "
          >
            Iniciar sesión</button
          ><button
            type="button"
            class="flex-1 py-2 rounded-lg transition-all duration-200"
            style="
              font-family: Inter, sans-serif;
              font-size: 0.8rem;
              font-weight: 400;
              background: transparent;
              color: rgb(255, 255, 255);
              border-width: medium;
              border-style: none;
              border-color: currentcolor;
              border-image: none;
              cursor: pointer;
            "
          >
            Registrarme
          </button>
        </div>
        <div class="flex flex-col gap-1.5 w-full">
          <p
            style="
              font-family: Inter, sans-serif;
              font-weight: 600;
              font-size: 14px;
              color: rgb(255, 255, 255);
            "
          >
            Email
          </p>
          <div class="bg-white relative rounded-lg w-full">
            <input
              type="email"
              placeholder="Ingresá tu correo"
              class="w-full outline-none bg-transparent px-3 py-2.5"
              value=""
              style="
                font-family: Inter, sans-serif;
                font-size: 14px;
                color: rgb(0, 0, 0);
              "
            />
            <div
              aria-hidden="true"
              class="absolute inset-[-0.5px] pointer-events-none rounded-[8.5px]"
              style="border: 1px solid rgb(217, 217, 217)"
            ></div>
          </div>
        </div>
        <div class="flex flex-col gap-1.5 w-full">
          <p
            style="
              font-family: Inter, sans-serif;
              font-weight: 600;
              font-size: 14px;
              color: rgb(255, 255, 255);
            "
          >
            Contraseña
          </p>
          <div class="bg-white relative rounded-lg w-full">
            <input
              type="password"
              placeholder="Ingresá tu contraseña"
              class="w-full outline-none bg-transparent px-3 py-2.5"
              value=""
              style="
                font-family: Inter, sans-serif;
                font-size: 14px;
                color: rgb(0, 0, 0);
              "
            />
            <div
              aria-hidden="true"
              class="absolute inset-[-0.5px] pointer-events-none rounded-[8.5px]"
              style="border: 1px solid rgb(217, 217, 217)"
            ></div>
          </div>
        </div>
        <button
          type="submit"
          class="w-full h-11 rounded-[14px] flex items-center justify-center transition-opacity hover:opacity-90"
          style="
            background: linear-gradient(
              to right,
              rgba(255, 90, 0, 0.85),
              rgba(0, 0, 26, 0.8)
            );
            border-width: medium;
            border-style: none;
            border-color: currentcolor;
            border-image: none;
            cursor: pointer;
            opacity: 1;
          "
        >
          <span
            style="
              font-family: Raleway, sans-serif;
              font-weight: 700;
              font-size: 1rem;
              color: rgb(255, 255, 255);
            "
            >Ingresar</span
          >
        </button>
      </form>
    </div>
  </body>
</html>
